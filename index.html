<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05091A" />

    <link rel="icon" type="image/png" href="/Abbas Digital Agency - Favicon.png" />
    <link rel="apple-touch-icon" href="/Abbas Digital Agency - Favicon.png" />

    <!-- Default title (overridden per-page by react-helmet-async) -->
    <title>Digital Marketing Agency Islamabad | Abbas Digital Agency</title>
    <meta name="description" content="Abbas Digital Agency delivers SEO, web design &amp; digital marketing for businesses in Pakistan &amp; USA. US-registered. Free consultation." />

    <!-- DNS prefetch for analytics only. Fonts are self-hosted (see index.css),
         so there is no external font request and no render-blocking stylesheet. -->
    <link rel="dns-prefetch" href="//www.google-analytics.com" />
    <link rel="dns-prefetch" href="//www.googletagmanager.com" />

    <!-- Preload self-hosted primary fonts to avoid FOUT / layout shift -->
    <link rel="preload" href="/DM_Sans/DMSans-VariableFont_opsz,wght.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/Urbanist/Urbanist-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin />

    <!-- Google Analytics 4 — loaded after first user interaction (see /src/lib/analytics.js)
         to keep it off the critical path and reduce main-thread JS on load. -->
    <script type="module" src="/src/lib/analytics.js"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B7C1MH1KZQ', { send_page_view: false });
    </script>

    <!-- Sitewide WebSite schema (per-page Organization / LocalBusiness / FAQ
         / Article schema is injected by the SEO component on each route). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://abbasdigitalagency.com/#website",
      "url": "https://abbasdigitalagency.com",
      "name": "Abbas Digital Agency",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://abbasdigitalagency.com/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
